ine">		<span class="keyword">for</span> rnum != num &#123;</span><br><span class="line">			<span class="keyword">if</span> num &gt; rnum &#123;</span><br><span class="line">				fmt.Println(<span class="string">&quot;猜大了&quot;</span>)</span><br><span class="line">			&#125; <span class="keyword">else</span> <span class="keyword">if</span> num &lt; rnum &#123;</span><br><span class="line">				fmt.Println(<span class="string">&quot;猜小了&quot;</span>)</span><br><span class="line">			&#125;</span><br><span class="line">			fmt.Scanln(&amp;num)</span><br><span class="line">		&#125;</span><br><span class="line">		fmt.Println(<span class="string">&quot;恭喜，猜对了&quot;</span>)</span><br><span class="line"></span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">randnum</span><span class="params">()</span></span> <span class="type">int</span> &#123;</span><br><span class="line">	rand.Seed(time.Now().Unix())</span><br><span class="line">	<span class="keyword">return</span> rand.Intn(<span class="number">100</span>)</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

n><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment">- 输入tree.exe能够以树状的形式当前目录下所有文件</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> (</span><br><span class="line">	<span class="string">&quot;bufio&quot;</span></span><br><span class="line">	<span class="string">&quot;fmt&quot;</span></span><br><span class="line">	<span class="string">&quot;io/ioutil&quot;</span></span><br><span class="line">	<span class="string">&quot;os&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">getPath</span><span class="params">(path <span class="type">string</span>, indent <span class="type">string</span>)</span></span> &#123;</span><br><span class="line">	files, err := ioutil.ReadDir(path)</span><br><span class="line">	<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">		fmt.Println(<span class="string">&quot;read file path error&quot;</span>, err)</span><br><span class="line">		<span class="keyword">return</span></span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">// 忽略以 . 开头的文件</span></span><br><span class="line">	<span class="keyword">for</span> i := <span class="number">0</span>; i &lt; <span class="built_in">len</span>(files); i++ &#123;</span><br><span class="line">		<span class="keyword">if</span> files[i].Name()[<span class="number">0</span>] == <span class="string">&#x27;.&#x27;</span> &#123;</span><br><span class="line"></span><br><span class="line">			<span class="comment">// 语法糖：...将一个切片或数组变成一个一个的元素,俗称将数组打散,用于append两个数组时</span></span><br><span class="line">			<span class="comment">// ar[:n]等价于a[0:n] 即初始化为0</span></span><br><span class="line">			<span class="comment">// ar[n:]等价于ar[n:len(ar)] 即默认为len(array/slice)</span></span><br><span class="line">			<span class="comment">// append 追加</span></span><br><span class="line">			files = <span class="built_in">append</span>(files[:i], files[i+<span class="number">1</span>:]...)</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">// 创建文件名数组</span></span><br><span class="line">	dirs := <span class="built_in">make</span>([]<span class="type">string</span>, <span class="number">0</span>)</span><br><span class="line"></span><br><span class="line">	<span class="comment">// 先打印文件</span></span><br><span class="line">	<span class="keyword">for</span> _, fi := <span class="keyword">range</span> files &#123;</span><br><span class="line">		<span class="keyword">if</span> !fi.IsDir() &#123;</span><br><span class="line">			dirs = <span class="built_in">append</span>(dirs, fi.Name())</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="comment">// 记录文件个数</span></span><br><span class="line">	lenFile := <span class="built_in">len</span>(dirs)</span><br><span class="line"></span><br><span class="line">	<span class="comment">// 再打印文件夹</span></span><br><span class="line">	<span class="keyword">for</span> _, fi := <span class="keyword">range</span> files &#123;</span><br><span class="line">		<span class="keyword">if</span> fi.IsDir() &#123;</span><br><span class="line">			dirs = <span class="built_in">append</span>(dirs, fi.Name())</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="comment">// 最后一个文件的分支用 └── 表示, 更美观</span></span><br><span class="line">	<span class="keyword">for</span> i := <span class="number">0</span>; i &lt; <span class="built_in">len</span>(dirs); i++ &#123;</span><br><span class="line">		<span class="keyword">if</span> i == <span class="built_in">len</span>(dirs)<span class="number">-1</span> &#123;</span><br><span class="line">			fmt.Println(indent + <span class="string">&quot;└── &quot;</span> + dirs[i])</span><br><span class="line">			<span class="keyword">if</span> i &gt;= lenFile &#123;</span><br><span class="line">				getPath(path+<span class="string">&quot;/&quot;</span>+dirs[i], indent+<span class="string">&quot;   &quot;</span>)</span><br><span class="line">			&#125;</span><br><span class="line">		&#125; <span class="keyword">else</span> &#123;</span><br><span class="line">			fmt.Println(indent + <span class="string">&quot;├── &quot;</span> + dirs[i])</span><br><span class="line">			<span class="keyword">if</span> i &gt;= lenFile &#123;</span><br><span class="line">				getPath(path+<span class="string">&quot;/&quot;</span>+dirs[i], indent+<span class="string">&quot;│  &quot;</span>)</span><br><span class="line">			&#125;</span><br><span class="line">		&#125;</span><br><span class="line"></span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	inputReader := bufio.NewReader(os.Stdin)</span><br><span class="line">	fmt.Println(<span class="string">&quot;输入tree.exe查看当前目录文件&quot;</span>)</span><br><span class="line">	input, er := inputReader.ReadString(<span class="string">&#x27;\n&#x27;</span>)</span><br><span class="line"></span><br><span class="line">	<span class="keyword">if</span> er != <span class="literal">nil</span> &#123;</span><br><span class="line">		fmt.Println(<span class="string">&quot;read错误&quot;</span>)</span><br><span class="line">		<span class="keyword">return</span></span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">switch</span> input &#123;</span><br><span class="line"></span><br><span class="line">	<span class="comment">// win下为 \r\n</span></span><br><span class="line">	<span class="keyword">case</span> <span class="string">&quot;tree.exe\n&quot;</span>:</span><br><span class="line">		exPath, err := os.Getwd() <span class="comment">// 获取程序执行的当前路径</span></span><br><span class="line">		<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">			fmt.Println(<span class="string">&quot;路径错误&quot;</span>)</span><br><span class="line">		&#125;</span><br><span class="line">		fmt.Println(<span class="string">&quot;\n当前运行目录：&quot;</span>, exPath)</span><br><span class="line">		getPath(exPath, <span class="string">&quot;&quot;</span>)</span><br><span class="line">	<span class="keyword">default</span>:</span><br><span class="line">		fmt.Println(<span class="string">&quot;不支持其他输入&quot;</span>)</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>



<h4 id="3-jjjb"><a href="#3-jjjb" class="headerlink" title="3.jjjb"></a>3.jjjb</h4><figure class="highlight go"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment">- 你有50枚⾦金金币，需要分配给以下⼏几个⼈人:</span></span><br><span class="line"><span class="comment">- Matthew, Sarah, Augustus, Heidi, Emilie,Peter, Giana, Adriano, Aaron, Elizabeth。</span></span><br><span class="line"><span class="comment">- 分配规则如下所示:</span></span><br><span class="line"><span class="comment">- 名字中包含’a’或’A’: 1枚⾦金金币</span></span><br><span class="line"><span class="comment">- 名字中包含’e’或’E’: 1枚⾦金金币</span></span><br><span class="line"><span class="comment">- 名字中包含 ‘i’或’I’: 2枚⾦金金币</span></span><br><span class="line"><span class="comment">- 名字中包含’o’或’O’: 3枚⾦金金币</span></span><br><span class="line"><span class="comment">- 名字中包含’u’或’U’: 5枚⾦金金币</span></span><br><span class="line"><span class="comment">写⼀一个程序，计算每个⽤用户分到了了多少⾦金金币，以及最后剩余多少⾦金金币?</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> (</span><br><span class="line">	<span class="string">&quot;fmt&quot;</span></span><br><span class="line">	<span class="string">&quot;strings&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="keyword">var</span> (</span><br><span class="line">	coins = <span class="number">50</span></span><br><span class="line">	users = []<span class="type">string</span>&#123;</span><br><span class="line">		<span class="string">&quot;Matthew&quot;</span>, <span class="string">&quot;Sarah&quot;</span>, <span class="string">&quot;Augustus&quot;</span>, <span class="string">&quot;Heidi&quot;</span>, <span class="string">&quot;Emilie&quot;</span>, <span class="string">&quot;Peter&quot;</span>, <span class="string">&quot;Giana&quot;</span>, <span class="string">&quot;Adriano&quot;</span>, <span class="string">&quot;Aaron&quot;</span>, <span class="string">&quot;Elizabeth&quot;</span>,</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">// map</span></span><br><span class="line">	distribution = <span class="built_in">make</span>(<span class="keyword">map</span>[<span class="type">string</span>]<span class="type">int</span>, <span class="built_in">len</span>(users))</span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	left := dispatchCoin()</span><br><span class="line">	fmt.Println(<span class="string">&quot;剩下：&quot;</span>, left)</span><br><span class="line">	<span class="comment">// 打印各自的jjjb</span></span><br><span class="line">	<span class="keyword">for</span> _, name := <span class="keyword">range</span> users &#123;</span><br><span class="line">		fmt.Printf(<span class="string">&quot;%s：%djjjb\n&quot;</span>, name, distribution[name])</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">dispatchCoin</span><span class="params">()</span></span> <span class="type">int</span> &#123;</span><br><span class="line">BREAK1:</span><br><span class="line">	<span class="keyword">for</span> _, name := <span class="keyword">range</span> users &#123;</span><br><span class="line">		<span class="comment">// strings.ToLower()函数接收一个字符串，</span></span><br><span class="line">		<span class="comment">// 并将字符串中的每个ASCII字符转换成小写，最后将新的字符串返回。</span></span><br><span class="line"></span><br><span class="line">		<span class="comment">// strings.Split函数用于将指定的分隔符切割字符串</span></span><br><span class="line">		<span class="comment">// 并返回切割后的字符串切片。</span></span><br><span class="line">		nameSlice := strings.Split(strings.ToLower(name), <span class="string">&quot;&quot;</span>)</span><br><span class="line">		<span class="keyword">for</span> _, word := <span class="keyword">range</span> nameSlice &#123;</span><br><span class="line">			<span class="keyword">if</span> coins == <span class="number">0</span> &#123;</span><br><span class="line">				fmt.Println(<span class="string">&quot;jjjb不足&quot;</span>)</span><br><span class="line">				<span class="keyword">break</span> BREAK1</span><br><span class="line">			&#125;</span><br><span class="line">			<span class="keyword">switch</span> word &#123;</span><br><span class="line">			<span class="keyword">case</span> <span class="string">&quot;a&quot;</span>, <span class="string">&quot;e&quot;</span>:</span><br><span class="line">				<span class="keyword">if</span> coins &gt;= <span class="number">1</span> &#123;</span><br><span class="line">					distribution[name]++</span><br><span class="line">					coins--</span><br><span class="line">				&#125;</span><br><span class="line">			<span class="keyword">case</span> <span class="string">&quot;i&quot;</span>:</span><br><span class="line">				<span class="keyword">if</span> coins &gt;= <span class="number">2</span> &#123;</span><br><span class="line">					distribution[name] += <span class="number">2</span></span><br><span class="line">					coins -= <span class="number">2</span></span><br><span class="line">				&#125;</span><br><span class="line">			<span class="keyword">case</span> <span class="string">&quot;o&quot;</span>:</span><br><span class="line">				<span class="keyword">if</span> coins &gt;= <span class="number">3</span> &#123;</span><br><span class="line">					distribution[name] += <span class="number">3</span></span><br><span class="line">					coins -= <span class="number">3</span></span><br><span class="line">				&#125;</span><br><span class="line">			<span class="keyword">case</span> <span class="string">&quot;u&quot;</span>:</span><br><span class="line">				<span class="keyword">if</span> coins &gt;= <span class="number">5</span> &#123;</span><br><span class="line">					distribution[name] += <span class="number">5</span></span><br><span class="line">					coins -= <span class="number">5</span></span><br><span class="line">				&#125;</span><br><span class="line">			&#125;</span><br><span class="line"></span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">return</span> coins</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
